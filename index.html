<!DOCTYPE html>
<html>
<head>
  <title>Dental Review SMS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Dental Review SMS MVP</h1>

<h2>Add Patient</h2>

<input id="firstName" placeholder="First Name"><br><br>
<input id="mobileNumber" placeholder="Mobile Number"><br><br>

<button id="addButton">Add Patient</button>

<p id="status"></p>

<hr>

<h2>Request History</h2>

<table border="1" id="historyTable">
<tr>
<th>Patient</th>
<th>Mobile</th>
<th>Status</th>
<th>Created</th>
</tr>
</table>

<script>

const SUPABASE_URL = "https://opshfrdyjojnplpcizmu.supabase.co"
const SUPABASE_ANON_KEY = "sb_publishable_OT7PjYOnjw-Dv-9m1v7Vow_d-Mlau18"

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
)

async function loadHistory() {

  const { data, error } = await supabaseClient
    .from("review_requests")
    .select(`
      status,
      created_at,
      patients (
        first_name,
        mobile_number
      )
    `)
    .order("created_at", { ascending: false })

  if (error) return

  const table = document.getElementById("historyTable")

  data.forEach(row => {

    const tr = document.createElement("tr")

    tr.innerHTML = `
      <td>${row.patients.first_name}</td>
      <td>${row.patients.mobile_number}</td>
      <td>${row.status}</td>
      <td>${row.created_at}</td>
    `

    table.appendChild(tr)

  })

}

async function addPatient() {

  const firstName = document.getElementById("firstName").value
  const mobileNumber = document.getElementById("mobileNumber").value
  const status = document.getElementById("status")

  status.innerText = "Saving..."

  const { data: practice } = await supabaseClient
    .from("practices")
    .select("id")
    .limit(1)
    .single()

  const { data: patient } = await supabaseClient
    .from("patients")
    .insert({
      practice_id: practice.id,
      first_name: firstName,
      mobile_number: mobileNumber,
      visit_datetime: new Date(),
      consent: true
    })
    .select()
    .single()

  await supabaseClient
    .from("review_requests")
    .insert({
      patient_id: patient.id,
      status: "pending"
    })

  status.innerText = "Patient and request saved successfully"

  location.reload()

}

document.getElementById("addButton").onclick = addPatient

loadHistory()

</script>

</body>
</html>
