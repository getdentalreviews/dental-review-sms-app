<!DOCTYPE html>
<html>
<head>
  <title>Dental Review SMS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Dental Review SMS MVP</h1>

<h2>Add Patient</h2>

<input id="firstName" placeholder="First Name"><br><br>
<input id="mobileNumber" placeholder="Mobile Number"><br><br>

<button id="addButton">Add Patient</button>

<p id="status"></p>

<script>
const SUPABASE_URL = "https://opshfrdyjojnplpcizmu.supabase.co"
const SUPABASE_ANON_KEY = "sb_publishable_OT7PjYOnjw-Dv-9m1v7Vow_d-Mlau18"

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
)

async function addPatient() {
  const firstName = document.getElementById("firstName").value
  const mobileNumber = document.getElementById("mobileNumber").value
  const status = document.getElementById("status")

  status.innerText = "Saving..."

  const { data: practice, error: practiceError } = await supabaseClient
    .from("practices")
    .select("id")
    .limit(1)
    .single()

  if (practiceError) {
    status.innerText = "Error loading practice: " + practiceError.message
    return
  }

  const { data: patient, error: patientError } = await supabaseClient
    .from("patients")
    .insert({
      practice_id: practice.id,
      first_name: firstName,
      mobile_number: mobileNumber,
      visit_datetime: new Date(),
      consent: true
    })
    .select()
    .single()

  if (patientError) {
    status.innerText = "Error saving patient: " + patientError.message
    return
  }

  const { error: requestError } = await supabaseClient
    .from("review_requests")
    .insert({
      patient_id: patient.id,
      status: "pending",
      sent_at: null,
      failure_reason: null
    })

  if (requestError) {
    status.innerText = "Patient saved, but request log failed: " + requestError.message
    return
  }

  status.innerText = "Patient and request saved successfully"
}

document.getElementById("addButton").onclick = addPatient
</script>

</body>
</html>
