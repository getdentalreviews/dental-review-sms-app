<!DOCTYPE html>
<html>
<head>
  <title>Dental Review SMS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Dental Review SMS MVP</h1>

<h2>Add Patient</h2>

<input id="firstName" placeholder="First Name"><br><br>
<input id="mobileNumber" placeholder="Mobile Number"><br><br>
<input id="visitDatetime" type="datetime-local"><br><br>

<label>
  <input id="consent" type="checkbox">
  Patient has consented to receive this SMS
</label><br><br>

<button id="addButton">Add Patient</button>

<p id="status"></p>

<hr>

<h2>Request History</h2>

<table border="1" id="historyTable">
  <tr>
    <th>Patient</th>
    <th>Mobile</th>
    <th>Status</th>
    <th>Created</th>
  </tr>
</table>

<script>
const SUPABASE_URL = "https://opshfrdyjojnplpcizmu.supabase.co"
const SUPABASE_ANON_KEY = "sb_publishable_OT7PjYOnjw-Dv-9m1v7Vow_d-Mlau18"

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
)

document.getElementById("visitDatetime").value = new Date(
  Date.now() - new Date().getTimezoneOffset() * 60000
).toISOString().slice(0, 16)

async function loadHistory() {
  const { data, error } = await supabaseClient
    .from("review_requests")
    .select(`
      status,
      created_at,
      patients (
        first_name,
        mobile_number
      )
    `)
    .order("created_at", { ascending: false })

  if (error) return

  const table = document.getElementById("historyTable")

  data.forEach(row => {
    const tr = document.createElement("tr")
    tr.innerHTML = `
      <td>${row.patients.first_name}</td>
      <td>${row.patients.mobile_number}</td>
      <td>${row.status}</td>
      <td>${row.created_at}</td>
    `
    table.appendChild(tr)
  })
}

async function addPatient() {
  const firstName = document.getElementById("firstName").value
  const mobileNumber = document.getElementById("mobileNumber").value
  const visitDatetime = document.getElementById("visitDatetime").value
  const consent = document.getElementById("consent").checked
  const status = document.getElementById("status")

  if (!firstName || !mobileNumber || !visitDatetime) {
    status.innerText = "Please complete all fields"
    return
  }

  if (!consent) {
    status.innerText = "Consent is required"
    return
  }

  status.innerText = "Saving..."

  const { data: practice, error: practiceError } = await supabaseClient
    .from("practices")
    .select("*")
    .limit(1)
    .single()

  if (practiceError) {
    status.innerText = "Error loading practice: " + practiceError.message
    return
  }

  const { data: patient, error: patientError } = await supabaseClient
    .from("patients")
    .insert({
      practice_id: practice.id,
      first_name: firstName,
      mobile_number: mobileNumber,
      visit_datetime: visitDatetime,
      consent: consent
    })
    .select()
    .single()

  if (patientError) {
    status.innerText = "Error saving patient: " + patientError.message
    return
  }

  const { data: requestRecord, error: requestError } = await supabaseClient
    .from("review_requests")
    .insert({
      patient_id: patient.id,
      status: "pending"
    })
    .select()
    .single()

  if (requestError) {
    status.innerText = "Patient saved, but request log failed: " + requestError.message
    return
  }

  const message = practice.sms_template
    .replace("{first_name}", firstName)
    .replace("{practice_name}", practice.practice_name)
    .replace("{google_review_link}", practice.google_review_link)

  const response = await fetch("/api/send-sms", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      to: mobileNumber,
      body: message,
      reviewRequestId: requestRecord.id
    })
  })

  const result = await response.json()

  if (!response.ok) {
    status.innerText = "Saved, but SMS failed: " + result.error
    location.reload()
    return
  }

  status.innerText = "Patient added and SMS sent"
  location.reload()
}

document.getElementById("addButton").onclick = addPatient

loadHistory()
</script>

</body>
</html>
